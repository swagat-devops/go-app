# Ingress resource for the application
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: dev
  name: go-web-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: go-web-app
              port:
                number: 80
